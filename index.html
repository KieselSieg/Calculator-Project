<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="./css.css">
    <script src="./jav.js" defer></script>
</head>
<body>
    <div class="main_frame">
        <div class="visualizer">
            <prompt><em>Expressions/values will be displayed here</em></prompt>
        </div>
        <div class="keypad">
            <div class="numberspad">
                <button>7</button>
                <button>8</button>
                <button>9</button>
                <button>4</button>
                <button>5</button>
                <button>6</button>
                <button>1</button>
                <button>2</button>
                <button>3</button>
                <button>0</button>
                
            </div>
            <div class="operators">
                <button><strong>C</strong></button>
                <button>+</button>
                <button>-</button>
                <button>×</button>
                <button>÷</button>
                <button class="special">=</button>
                
            </div> 
        </div>
        
    </div>
</body>
</html>
